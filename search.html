---
layout: default
title: Search Results
---

<div id="search-window">
    <h2 style="color: #000000;">📂 Search Results for: <span id="search-query" style="color: #000;"></span></h2>
    <hr style="border: 1px inset white;">
    
    <p id="search-status" style="font-size: 0.9rem; color: #666;">Searching database...</p>

    <ul id="search-results-list" style="list-style: none; padding: 0;">
        </ul>

    <div id="no-results" style="display: none; border: 2px dashed red; padding: 15px; background: #ffebeb; color: red; font-weight: bold;">
        [!] ERROR: No matching files found in the system.
    </div>
</div>

<script>
    const allPosts = [
        {% for post in site.posts %}
        {
            "title": "{{ post.title }}",
            "url": "{{ post.url | relative_url }}",
            "date": "{{ post.date | date: '%Y-%m-%d' }}"
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ];

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        const queryDisplay = document.getElementById('search-query');
        const resultsList = document.getElementById('search-results-list');
        const status = document.getElementById('search-status');
        const noResults = document.getElementById('no-results');

        if (query) {
            queryDisplay.innerText = '"' + query + '"';
            const filteredPosts = allPosts.filter(post => 
                post.title.toLowerCase().includes(query.toLowerCase())
            );

            setTimeout(() => { // 약간의 로딩 연출 (Y2K 감성)
                status.innerText = filteredPosts.length + " file(s) found.";
                
                if (filteredPosts.length > 0) {
                    filteredPosts.forEach(post => {
                        const li = document.createElement('li');
                        li.style.marginBottom = "15px";
                        li.style.border = "1px solid #808080";
                        li.style.padding = "10px";
                        li.style.background = "white";
                        li.innerHTML = `
                            <small>${post.date}</small><br>
                            <a href="${post.url}" style="color: #4b3052; font-weight: bold; text-decoration: none;">
                                ${post.title}
                            </a>
                        `;
                        resultsList.appendChild(li);
                    });
                } else {
                    noResults.style.display = 'block';
                }
            }, 500);
        }
    };
</script>
