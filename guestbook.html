layout: default
title: Guestbook
---

<style>
    @keyframes intense-glitch {
        0% { transform: translate(-50%, -50%); clip-path: inset(40% 0 61% 0); }
        10% { transform: translate(-52%, -50%); clip-path: inset(92% 0 1% 0); }
        20% { transform: translate(-48%, -50%); clip-path: inset(10% 0 86% 0); }
        30% { transform: translate(-50%, -52%); clip-path: inset(80% 0 5% 0); }
        40% { transform: translate(-50%, -48%); clip-path: inset(30% 0 20% 0); }
        50% { transform: translate(-53%, -50%); clip-path: inset(50% 0 31% 0); }
        60% { transform: translate(-47%, -50%); clip-path: inset(15% 0 76% 0); }
        70% { transform: translate(-50%, -50%); }
        100% { transform: translate(-50%, -50%); }
    }

    @keyframes glitch-color {
        0% { transform: translate(-50%, -50%); text-shadow: 2px 0 red, -2px 0 blue; }
        20% { transform: translate(-51%, -49%); text-shadow: -2px 0 red, 2px 0 blue; }
        100% { transform: translate(-50%, -50%); text-shadow: none; }
    }

    .glitch-active {
        animation: intense-glitch 0.3s steps(2, end) infinite;
    }

    @media (min-width: 768px) {
        #error-popup {
            max-width: 550px !important;
            padding: 10px !important;
        }
        #error-message { font-size: 1.3rem !important; }
    }
</style>

<div class="guestbook-system">
    <h2 style="color: #000; margin-bottom: 20px; border-bottom: 1px double #808080; padding-bottom: 5px; font-size: clamp(0.8rem, 4vw, 1.2rem); word-break: break-all;">💾 SYSTEM_GUESTBOOK.exe</h2>
    
    <div style="background: var(--window-bg); border: 2px solid; border-color: white var(--window-border-dark) var(--window-border-dark) white; padding: 15px; margin-bottom: 20px;">
        <div style="margin-bottom: 10px;">
            <label style="font-weight: bold; font-size: 0.8rem;">USER_ID:</label>
            <input type="text" id="nickname" placeholder="Nickname" style="width: 100px; border: 2px inset white; padding: 3px; font-family: 'Courier New';">
        </div>
        <textarea id="message" placeholder="Type your message here..." style="width: 100%; height: 60px; border: 2px inset white; padding: 5px; font-family: 'Courier New'; margin-bottom: 10px; resize: none;"></textarea>
        <button onclick="writeMessage()" class="search-btn" style="width: 100%; height: 30px; font-weight: bold; text-align: center;">[ EXECUTE_WRITE ]</button>
    </div>

    <div id="popup-overlay" onclick="closePopup()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; backdrop-filter: blur(5px);">
    
    <div id="error-popup" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: #F25567; padding: 4px; box-shadow: 15px 15px 0px rgba(0,0,0,0.5); overflow: hidden;">
        
        <div class="inner-border" style="border: 2px solid rgba(255, 255, 255, 0.9); padding: 20px 15px; text-align: left; position: relative;">
            
            <div style="margin: 0 0 12px 0; color: #fff; font-size: 0.85rem; font-family: 'Courier New', monospace; font-weight: bold; background: rgba(255,255,255,0.2); display: inline-block; padding: 2px 5px;">
                CRITICAL_OVERFLOW
            </div>
            
            <p id="error-message" style="margin: 0; color: #ffffff; font-size: 1rem; line-height: 1.4; word-break: keep-all; font-weight: 700; text-transform: uppercase;">
                내용을 입력해주세요!
            </p>

            <div style="margin-top: 25px; font-size: 0.7rem; color: #fff; text-align: right; opacity: 0.6; font-family: monospace;">
                >> ERR_CODE: NULL_POST_DATA
            </div>
        </div>
    </div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBsvjvK0GtaKIkdxXnATLEsS_oM6xC8PIM",
        authDomain: "guestbook-fc04f.firebaseapp.com",
        databaseURL: "https://guestbook-fc04f-default-rtdb.firebaseio.com",
        projectId: "guestbook-fc04f",
        storageBucket: "guestbook-fc04f.firebasestorage.app",
        messagingSenderId: "5483457539",
        appId: "1:5483457539:web:86a0637e89614631d83236"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function showPopup(msg) {
        const popup = document.getElementById('error-popup');
        const overlay = document.getElementById('popup-overlay');
    
        document.getElementById('error-message').innerText = msg;
        overlay.style.display = 'block';
    
        popup.classList.add('glitch-active');
    
        setTimeout(() => {
            popup.classList.remove('glitch-active');
        }, 400);
    }

    function closePopup() {
        document.getElementById('popup-overlay').style.display = 'none';
    }

    function writeMessage() {
        const name = document.getElementById('nickname').value || "ANONYMOUS";
        const text = document.getElementById('message').value;
    
    
        if(!text) {
            showPopup("TEST");
            return;
        }

        database.ref('guestbook').push({
            name: name,
            text: text,
            date: new Date().toLocaleString()
        });
        document.getElementById('message').value = "";
    }

    database.ref('guestbook').on('value', (snapshot) => {
        const list = document.getElementById('guestbook-list');
        list.innerHTML = "";
        const data = snapshot.val();
        
        const keys = Object.keys(data || {}).reverse();
        keys.forEach(key => {
            const item = data[key];
            const div = document.createElement('div');
            div.style.cssText = "background: white; border: 1px solid #808080; padding: 10px; margin-bottom: 10px; box-shadow: inset -1px -1px #000;";
            div.innerHTML = `
                <div style="font-size: 0.75rem; color: #666; display: flex; justify-content: space-between;">
                    <span>FROM: ${item.name}</span>
                    <span>${item.date}</span>
                </div>
                <div style="margin-top: 5px; font-weight: bold; color: var(--main-purple);">- ${item.text}</div>
            `;
            list.appendChild(div);
        });
    });
</script>
