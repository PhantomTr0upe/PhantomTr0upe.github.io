---
layout: default
title: Guestbook
---

<style>
    #sub-message {
        color: #FFEBEE;
    }

    @keyframes quick-glitch {
        0% { transform: translate(-50%, -50%) scale(1); }
        5% { transform: translate(-51%, -49%) scale(1.02); filter: hue-rotate(90deg); }
        10% { transform: translate(-49%, -51%) scale(0.98); filter: hue-rotate(-90deg); }
        15% { transform: translate(-50%, -50%) scale(1); filter: none; }
        100% { transform: translate(-50%, -50%); }
    }

    .glitch-active {
        animation: quick-glitch 0.35s linear;
    }

    .guestbook-system {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    #popup-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        
        z-index: 10001; 
        
        backdrop-filter: blur(2px);
    }

    #error-popup {
        z-index: 10002; 
    }

    @media (min-width: 768px) {
        #error-popup {
            width: 550px !important; 
            max-width: 550px !important;
        }
        #error-popup .inner-border {
            padding: 60px 40px !important; 
        }
        #error-message {
            font-size: 1.4rem !important;
            line-height: 1.4 !important;
        }
        #sub-message {
            font-size: 1rem !important;
            line-height: 1 !important;
        }
    }

    .search-btn:active {
        padding-top: 2px; 
        box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); 
    }
</style>

<div class="guestbook-system">
    <h2 style="color: #000; margin-bottom: 20px; border-bottom: 1px double #808080; padding-bottom: 5px; font-size: clamp(0.8rem, 4vw, 1.2rem); word-break: break-all;">💾 GUESTBOOK.exe</h2>
    
    <div style="background: var(--window-bg); border: 2px solid; border-color: white var(--window-border-dark) var(--window-border-dark) white; padding: 15px; margin-bottom: 20px;">
        <div style="margin-bottom: 10px;">
            <label style="font-weight: bold; font-size: 0.8rem;">USER_ID:</label>
            <input type="text" id="nickname" placeholder="Nickname" style="width: 100px; border: 2px inset white; padding: 3px; font-family: Courier New;">
        </div>
        <textarea id="message" placeholder="Type here..." style="width: 100%; height: 60px; border: 2px inset white; padding: 5px; margin-bottom: 10px; resize: none; font-family: Courier New;"></textarea>
        <button onclick="writeMessage()" class="search-btn" 
            style="width: 100%; height: 35px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; box-sizing: border-box;">[ EXECUTE_WRITE ]</button>
    </div>
    <div id="guestbook-list" style="min-height: 100px; padding-bottom: 50px;">
    </div>
</div>

<div id="popup-overlay" onclick="closePopup()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10001; backdrop-filter: blur(2px);">
    <div id="error-popup" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: #F25567; padding: 4px; box-shadow: 10px 10px 0px rgba(0,0,0,0.4); z-index: 10002;">
        <div style="border: 1px solid white; padding: 15px; text-align: left;">
            <p id="sub-message" style="font-size: 0.7rem; font-family: CloudSansCode; margin-bottom: 8px; opacity: 0.8; font-weight: bold;">[돌발!]</p>
            <p id="error-message" style="margin: 0; color: #FFEBEE; font-size: 0.9rem; line-height: 1.4; font-weight: bold;"></p>
            <p id="sub-message" style="margin-top: 15px; font-size: 0.7rem; margin-bottom: 8px; opacity: 0.8;">
                <br><span style="font-weight: bold;">['방명록 작성이 아니면 죽음을']</span><br>
                정해진 기간 내로 방명록에 아무런 텍스트도 작성하지 않을 시, 사망<br>
                남은 기간 : D - 365
            </p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBsvjvK0GtaKIkdxXnATLEsS_oM6xC8PIM",
        authDomain: "guestbook-fc04f.firebaseapp.com",
        databaseURL: "https://guestbook-fc04f-default-rtdb.firebaseio.com",
        projectId: "guestbook-fc04f",
        storageBucket: "guestbook-fc04f.firebasestorage.app",
        messagingSenderId: "5483457539",
        appId: "1:5483457539:web:86a0637e89614631d83236"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function showPopup(msg) {
        const popup = document.getElementById('error-popup');
        const overlay = document.getElementById('popup-overlay');
    
        document.getElementById('error-message').innerText = msg;
        overlay.style.display = 'block';
    
        popup.classList.add('glitch-active');
        setTimeout(() => {
            popup.classList.remove('glitch-active');
        }, 350);
    }

    function closePopup() {
        document.getElementById('popup-overlay').style.display = 'none';
    }

    function writeMessage() {
        const name = document.getElementById('nickname').value || "ANONYMOUS";
        const text = document.getElementById('message').value;
    
    
        if(!text) {
            showPopup("상태이상 : '방명록 작성이 아니면 죽음을' 발생!");
            return;
        }

        database.ref('guestbook').push({
            name: name,
            text: text,
            date: new Date().toLocaleString()
        });
        document.getElementById('message').value = "";
    }

    database.ref('guestbook').on('value', (snapshot) => {
        const list = document.getElementById('guestbook-list');
        list.innerHTML = "";
        const data = snapshot.val();
        
        const keys = Object.keys(data || {}).reverse();
        keys.forEach(key => {
            const item = data[key];
            const div = document.createElement('div');
            div.style.cssText = "background: white; border: 1px solid #808080; padding: 10px; margin-bottom: 10px; box-shadow: inset -1px -1px #000;";
            div.innerHTML = `
                <div style="font-size: 0.75rem; color: #666; display: flex; justify-content: space-between;">
                    <span>FROM: ${item.name}</span>
                    <span>${item.date}</span>
                </div>
                <div style="margin-top: 5px; font-weight: bold; color: var(--main-purple);">- ${item.text}</div>
            `;
            list.appendChild(div);
        });
    });
</script>
