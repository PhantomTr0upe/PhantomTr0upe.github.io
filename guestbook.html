---
layout: default
title: Guestbook
---

<style>
    @keyframes glitch {
        0% { transform: translate(-50%, -50%) skew(0deg); opacity: 1; }
        20% { transform: translate(-52%, -48%) skew(3deg); opacity: 0.8; }
        40% { transform: translate(-48%, -52%) skew(-3deg); opacity: 0.9; }
        60% { transform: translate(-51%, -49%) skew(1deg); opacity: 0.8; }
        80% { transform: translate(-49%, -51%) skew(-1deg); opacity: 1; }
        100% { transform: translate(-50%, -50%) skew(0deg); opacity: 1; }
    }

    .glitch-effect {
        animation: glitch 0.2s ease-in-out;
    }

    @media (min-width: 768px) {
        #error-popup {
            max-width: 500px !important; 
            padding: 8px !important;   
        }
        #error-popup .inner-border {
            padding: 40px 30px !important; 
        }
        #error-message {
            font-size: 1.2rem !important;  
        }
    }
</style>

<div class="guestbook-system">
    <h2 style="color: #000; margin-bottom: 20px; border-bottom: 1px double #808080; padding-bottom: 5px; font-size: clamp(0.8rem, 4vw, 1.2rem); word-break: break-all;">💾 SYSTEM_GUESTBOOK.exe</h2>
    
    <div style="background: var(--window-bg); border: 2px solid; border-color: white var(--window-border-dark) var(--window-border-dark) white; padding: 15px; margin-bottom: 20px;">
        <div style="margin-bottom: 10px;">
            <label style="font-weight: bold; font-size: 0.8rem;">USER_ID:</label>
            <input type="text" id="nickname" placeholder="Nickname" style="width: 100px; border: 2px inset white; padding: 3px; font-family: 'Courier New';">
        </div>
        <textarea id="message" placeholder="Type your message here..." style="width: 100%; height: 60px; border: 2px inset white; padding: 5px; font-family: 'Courier New'; margin-bottom: 10px; resize: none;"></textarea>
        <button onclick="writeMessage()" class="search-btn" style="width: 100%; height: 30px; font-weight: bold; text-align: center;">[ EXECUTE_WRITE ]</button>
    </div>

    <div id="popup-overlay" onclick="closePopup()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; backdrop-filter: blur(3px);">
    
    <div id="error-popup" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: #F25567; padding: 4px; box-shadow: 12px 12px 0px rgba(0,0,0,0.4); transition: all 0.2s;">
        
        <div class="inner-border" style="border: 1px solid rgba(255, 255, 255, 0.9); padding: 15px 12px; text-align: left;">
            
            <div style="margin: 0 0 10px 0; color: #fff; font-size: 0.8rem; font-family: 'Courier New', monospace; font-weight: bold; opacity: 0.8; letter-spacing: 2px;">
                [ CRITICAL_SYSTEM_FAILURE ]
            </div>
            
            <p id="error-message" style="margin: 0; color: #ffffff; font-size: 0.9rem; line-height: 1.5; word-break: keep-all; font-weight: 500;">
                내용을 입력해주세요!
            </p>

            <div style="margin-top: 20px; font-size: 0.65rem; color: rgba(255,255,255,0.6); text-align: right; font-style: italic;">
                TERMINATE_BY_CLICK_
            </div>
        </div>
    </div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBsvjvK0GtaKIkdxXnATLEsS_oM6xC8PIM",
        authDomain: "guestbook-fc04f.firebaseapp.com",
        databaseURL: "https://guestbook-fc04f-default-rtdb.firebaseio.com",
        projectId: "guestbook-fc04f",
        storageBucket: "guestbook-fc04f.firebasestorage.app",
        messagingSenderId: "5483457539",
        appId: "1:5483457539:web:86a0637e89614631d83236"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function showPopup(msg) {
        const popup = document.getElementById('error-popup');
        const overlay = document.getElementById('popup-overlay');
    
        document.getElementById('error-message').innerText = msg;
    
        overlay.style.display = 'block';
    
        popup.classList.remove('glitch-effect');
        void popup.offsetWidth; 
        popup.classList.add('glitch-effect');
    }

    function closePopup() {
        document.getElementById('popup-overlay').style.display = 'none';
    }

    function writeMessage() {
        const name = document.getElementById('nickname').value || "ANONYMOUS";
        const text = document.getElementById('message').value;
    
    
        if(!text) {
            showPopup("TEST");
            return;
        }

        database.ref('guestbook').push({
            name: name,
            text: text,
            date: new Date().toLocaleString()
        });
        document.getElementById('message').value = "";
    }

    database.ref('guestbook').on('value', (snapshot) => {
        const list = document.getElementById('guestbook-list');
        list.innerHTML = "";
        const data = snapshot.val();
        
        const keys = Object.keys(data || {}).reverse();
        keys.forEach(key => {
            const item = data[key];
            const div = document.createElement('div');
            div.style.cssText = "background: white; border: 1px solid #808080; padding: 10px; margin-bottom: 10px; box-shadow: inset -1px -1px #000;";
            div.innerHTML = `
                <div style="font-size: 0.75rem; color: #666; display: flex; justify-content: space-between;">
                    <span>FROM: ${item.name}</span>
                    <span>${item.date}</span>
                </div>
                <div style="margin-top: 5px; font-weight: bold; color: var(--main-purple);">- ${item.text}</div>
            `;
            list.appendChild(div);
        });
    });
</script>
