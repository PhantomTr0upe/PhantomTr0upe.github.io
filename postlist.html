---
layout: null
---
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post List | Yuhan</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #816c86; padding: 20px 0; box-sizing: border-box; }
        
        /* 헤더 박스 수치 고정 */
        .header-box { width: 50%; height: 80px; background-color: white; border-radius: 15px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .logo-circle { 
            width: 40px; height: 40px; background-color: black; border-radius: 50%; 
            background-image: url('https://i.ibb.co/yF0D9yJq/265834165.png'); background-size: cover; background-position: center; 
            transition: transform 0.2s; border: 2px solid white; box-sizing: border-box;
        }
        .logo-circle:hover { transform: scale(1.1); }
        
        /* 제목에서 밑줄 제거 */
        .site-title { font-size: 1.2rem; font-weight: bold; color: #333; text-decoration: none !important; }
        .site-title span { color: #333; text-decoration: none; }

        .nav-menu { display: flex; gap: 20px; }
        .nav-menu a { color: #333; font-weight: bold; text-decoration: none; font-size: 1rem; transition: color 0.2s; }
        .nav-menu a:hover { color: #007bff; }

        .post-list-container { width: 50%; display: flex; flex-direction: column; gap: 20px; }
        .post-item { background-color: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); transition: transform 0.2s; text-decoration: none; color: inherit; display: block; }
        .post-item:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); }
        .post-item h2 { margin: 0 0 10px 0; color: #333; font-size: 1.4rem; }
        .post-date { font-size: 0.9rem; color: #999; margin-bottom: 8px; display: block; }

        #backToTop { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background-color: white; color: #333; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2); cursor: pointer; font-size: 20px; transition: all 0.3s; opacity: 0; visibility: hidden; z-index: 999; }
        #backToTop.show { opacity: 1; visibility: visible; }

        @media (max-width: 768px) { .header-box, .post-list-container { width: 90%; } }
    </style>
</head>
<body>
    <div class="header-box">
        <div class="header-left">
            <a href="/"><div class="logo-circle"></div></a>
            <a href="/" class="site-title">Yuhan</a>
        </div>
        <div class="nav-menu">
            <a href="/">Home</a>
            <a href="/postlist.html">Post</a>
        </div>
    </div>

    <div class="post-list-container">
        <h1 style="color: white; margin-bottom: 20px;">📝 모든 게시글</h1>
        {% for post in site.posts %}
        <a href="{{ post.url | relative_url }}" class="post-item">
            <span class="post-date">{{ post.date | date: "%Y년 %m월 %d일" }}</span>
            <h2>{{ post.title }}</h2>
            <p>{{ post.excerpt | strip_html | truncate: 100 }}</p>
        </a>
        {% endfor %}
    </div>

    <button id="backToTop" title="위로 가기">▲</button>
    <script>
        const topBtn = document.getElementById("backToTop");
        window.onscroll = function() {
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) { topBtn.classList.add("show"); } 
            else { topBtn.classList.remove("show"); }
        };
        topBtn.onclick = function() { window.scrollTo({ top: 0, behavior: "smooth" }); };
    </script>
</body>
</html>
