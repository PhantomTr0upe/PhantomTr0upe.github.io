layout: default
title: 게시글 목록
---

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post List | Yuhan</title>
    <style>
        /* 기존 디자인 스타일 유지 */
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #816c86;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .header-box {
            width: 50%;
            height: 80px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 40px; height: 40px; background-color: black; border-radius: 50%;
            background-image: url('https://i.ibb.co/yF0D9yJq/265834165.png'); background-size: cover; background-position: center;
        }
        .site-title { font-size: 1.2rem; font-weight: bold; color: #333; }
        .nav-menu { display: flex; gap: 20px; }
        .nav-menu a { color: #333; font-weight: bold; text-decoration: none; }
        .nav-menu a:hover { color: #007bff; }

        /* 게시글 목록 컨테이너 */
        .post-list-container {
            width: 50%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 개별 게시글 상자 스타일 */
        .post-item {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .post-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .post-item h2 { margin: 0 0 10px 0; color: #333; font-size: 1.4rem; }
        .post-item p { margin: 0; color: #666; line-height: 1.5; }
        .post-date { font-size: 0.9rem; color: #999; margin-bottom: 8px; display: block; }

        /* 하이퍼링크 밑줄 제거 */
        a {
            text-decoration: none;
        }

        #backToTop {
            position: fixed;        /* 화면에 고정 */
            bottom: 30px;           /* 아래에서 30px 띄움 */
            right: 30px;            /* 오른쪽에서 30px 띄움 */
            width: 50px;
            height: 50px;
            border-radius: 50%;     /* 동그랗게 */
            background-color: white;
            color: #333;
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;   /* 나타날 때 부드럽게 */
            opacity: 0;             /* 처음엔 안 보이게 */
            visibility: hidden;     /* 클릭도 안 되게 */
            z-index: 999;           /* 다른 상자들보다 위에 뜨게 */
        }

        /* 마우스를 올렸을 때 효과 */
        #backToTop:hover {
            background-color: #f0f2f5;
            transform: translateY(-5px); /* 살짝 위로 이동 */
        }

        /* 스크롤 했을 때 나타날 클래스 */
        #backToTop.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            .header-box, .post-list-container { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="header-box">
        <div class="header-left">
            <a href="/"><div class="logo-circle"></div></a>
            <span class="site-title"><a href="/"><span style="color:#333">Yuhan</span></a></span>
        </div>
        <div class="nav-menu">
            <a href="/">Home</a>
            <a href="/postlist.html">Post</a>
        </div>
    </div>

    <div class="post-list-container">
        <h1 style="color: white; margin-bottom: 10px;">📝 모든 게시글</h1>
        
        {% for post in site.posts %}
        <a href="{{ post.url }}" class="post-item">
            <span class="post-date">{{ post.date | date: "%Y년 %m월 %d일" }}</span>
            <h2>{{ post.title }}</h2>
            <p>{{ post.excerpt | strip_html | truncate: 120 }}</p>
        </a>
        {% endfor %}
        </div>

</body>

<script>
    const topBtn = document.getElementById("backToTop");

    // 사용자가 스크롤을 할 때마다 실행
    window.onscroll = function() {
        // 300px 이상 스크롤 되면 버튼을 보여주고, 아니면 숨김
        if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
            topBtn.classList.add("show");
        } else {
            topBtn.classList.remove("show");
        }
    };

    // 버튼을 클릭했을 때 실행
    topBtn.onclick = function() {
        window.scrollTo({
            top: 0,
            behavior: "smooth" /* 휘리릭~ 부드럽게 올라가는 마법의 코드 */
        });
    };
</script>
</html>
