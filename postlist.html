---
layout: default
title: Post List
---
<h2>My Posts</h2>
<ul style="list-style: none; padding: 0;">
    {% for post in site.posts %}
    <li style="margin-bottom: 15px; border: 1px solid #808080; padding: 10px; background: white;">
        <small>{{ post.date | date: "%Y-%m-%d" }}</small><br>
        <a href="{{ post.url | relative_url }}" style="color: #4b3052; font-weight: bold; font-size: 1.2rem;">
            {{ post.title }}
        </a>
    </li>
    {% endfor %}
</ul>
