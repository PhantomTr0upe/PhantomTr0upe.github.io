---
layout: default
title: Category Filter
---

<h2 id="category-title" style="color: #000; margin-bottom: 20px; border-bottom: 1px double #808080; padding-bottom: 5px; font-size: clamp(0.8rem, 4vw, 1.2rem); word-break: break-all;">
    📂 C:\Yuhan_OS_v1\POSTS\LOADING...
</h2>

<ul id="post-list" style="list-style: none; padding: 0;">
    {% for post in site.posts %}
    <li class="post-item" data-category="{{ post.category }}" style="display: none; margin-bottom: 15px;">
        <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: inherit; display: block; background: white; border: 1px solid #808080; padding: 15px; box-shadow: inset -1px -1px #000, inset 1px 1px #fff;">
            <div class="post-item-inner">
                <small style="color: #666;">[Date: {{ post.date | date: "%Y-%m-%d" }}]</small><br>
                <strong style="color: #000; font-size: 1.1rem; display: block; margin-top: 5px;">
                    📄 {{ post.title }}
                </strong>
            </div>
        </a>
    </li>
    {% endfor %}
    <li id="no-files" style="display: none; padding: 20px; text-align: center; border: 1px dashed #808080;">
        [!] No files found in this category.
    </li>
</ul>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const targetCategory = params.get('type');
        const titleElement = document.getElementById('category-title');
        const posts = document.querySelectorAll('.post-item');
        const noFiles = document.getElementById('no-files');
        
        let foundCount = 0;

        if (targetCategory) {
            titleElement.innerText = `📂 C:\\PHANTOM\\POSTS\\${targetCategory.toUpperCase()}`;
            
            posts.forEach(post => {
                if (post.getAttribute('data-category') === targetCategory) {
                    post.style.display = 'block';
                    foundCount++;
                }
            });
        }

        if (foundCount === 0) {
            noFiles.style.display = 'block';
        }
    });
</script>
