<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        @font-face {
            font-family: 'CloudSansCode';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408@1.0/goorm-sans-code.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #1a151d; 
            --window-bg: #e4e4e4;
            --window-border-light: #ffffff;
            --window-border-dark: #808080;
            --main-purple: #4E00F9; 
            --accent-blue: #8AD0FD; 
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px; 
            font-family: 'Courier New', 'CloudSansCode';
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .window {
            background: var(--window-bg);
            border: 3px solid;
            border-color: var(--window-border-light) var(--window-border-dark) var(--window-border-dark) var(--window-border-light);
            box-shadow: 10px 10px 0px rgba(78, 0, 249, 0.2);
            width: 90%; 
            max-width: 900px;
            margin-bottom: 20px;
            overflow: hidden; 
            
        }

        .title-bar {
            background: linear-gradient(90deg, var(--main-purple), var(--accent-blue));
            padding: 8px 12px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.3); 
        }

        .title-bar-text {
            font-size: 1.15rem; 
            font-family: 'Courier New', 'CloudSansCode', monospace; 
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        .title-bar-controls {
            display: flex;
            gap: 4px;
        }

        .title-bar-controls button {
            width: 23px;  
            height: 21px; 
            background: var(--window-bg);
            border: 2px solid;
            border-color: white var(--window-border-dark) var(--window-border-dark) white;
    
            display: flex;
            align-items: center;
            justify-content: center;
    
            font-family: 'Arial', sans-serif; 
            font-size: 12px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            padding: 0;
        }

        .title-bar-controls .btn-close {
            background-color: #e81123; 
            color: white;
            border-color: #f5b0b7 #820b13 #820b13 #f5b0b7; 
        }

        .title-bar-controls .btn-close:hover {
            background-color: #f1707a; 
        }

        .title-bar-controls .btn-close:active {
            border-color: #820b13 #f5b0b7 #f5b0b7 #820b13;
            padding-top: 1px;
        }

        .title-bar-controls .btn-minimize:active {
            border-color: var(--window-border-dark) white white var(--window-border-dark);
            padding-top: 1px;
        }

        .nav-menu {
            display: flex;
            gap: 5px; 
            padding: 5px;
            background: var(--window-bg);
            border-bottom: 2px solid var(--window-border-dark);
        }

        .nav-menu a {
            display: inline-block;
            padding: 3px 10px;
            color: #000;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            border: 2px solid transparent; 
        }

        .nav-menu a:hover {
            background-color: #e0e0e0; 
            border-color: white var(--window-border-dark) var(--window-border-dark) white; 
            color: var(--main-purple); 
        }

        .nav-menu a:active {
            border-color: var(--window-border-dark) white white var(--window-border-dark); 
            padding: 4px 9px 2px 11px; 
            background-color: #d0d0d0;
        }

        .search-container {
            background: #808080; 
            padding: 2px;
            display: flex;
            align-items: stretch; 
            gap: 0; 
            border-bottom: 2px solid white;
        }

        .search-label {
            background: var(--window-bg);
            padding: 0 10px;
            display: flex;
            align-items: center; 
            font-size: 0.75rem;
            font-weight: bold;
            border: 2px solid;
            border-color: white var(--window-border-dark) var(--window-border-dark) white;
            margin-right: 2px; 
        }

        #global-search {
            flex-grow: 1; 
            border: 2px inset white;
            background: white;
            padding: 5px;
            font-family: 'Courier New', 'CloudSansCode', monospace;
            font-size: 14px;
            outline: none;
            margin: 0; 
        }

        .search-btn {
            background: var(--window-bg);
            border: 2px solid;
            border-color: white var(--window-border-dark) var(--window-border-dark) white;
            cursor: pointer;
            padding: 0 15px;
            font-size: 0.8rem;
            font-family: 'Courier New', 'CloudSansCode', monospace;
            font-weight: bold;
            margin-left: 1px; 
            display: flex;
            align-items: center;
        }

        .search-btn:active {
            border-color: var(--window-border-dark) white white var(--window-border-dark);
            padding: 1px 14px 0 16px; 
        }

        .window-body { padding: 15px; color: #000; word-break: break-all; }

        @media (max-width: 480px) {
            .title-bar-text { font-size: 1rem; }
            .window { width: 95%; }
        }

        body {
            background-color: #ffffff; 
    
            background-image: url('{{ site.baseurl }}/bg.svg'); 
    
            background-repeat: repeat; 
            
            background-size: 800px; 
    
            background-attachment: fixed;
            background-position: center;

            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            top: 20px; 
            width: 250px;
            height: calc(100vh - 40px);
            background: var(--window-bg);
            border: 3px solid;
            border-color: white var(--window-border-dark) var(--window-border-dark) white;
            z-index: 9999; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }


        .sidebar-left { left: 10px; transform: translateX(-110%); }
        .sidebar-right { right: 10px; transform: translateX(110%); }


        @media (max-width: 767px) {
            .sidebar.active { transform: translateX(0) !important; }
            .sidebar { width: 80%; top: 0; height: 100vh; }
        }


        @media (min-width: 768px) {
            .sidebar-left { transform: translateX(0); }
            .sidebar-right { transform: translateX(0); }

            .sidebar-left.inactive { transform: translateX(-110%); }
            .sidebar-right.inactive { transform: translateX(110%); }

            body { 
                padding-left: 270px; 
                padding-right: 270px; 
                transition: padding 0.3s ease; 
            }
            

            body.no-left { padding-left: 20px !important; }
            body.no-right { padding-right: 20px !important; }
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .profile-img-box {
            width: 100%;
            aspect-ratio: 1 / 1; 
            border: 2px inset white;
            background: #c0c0c0;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .profile-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .profile-nickname {
            width: 100%;
            background: #000080;
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border: 1px inset rgba(255,255,255,0.5);
        }

        .profile-bio {
            width: 100%;
            background: white;
            border: 2px inset white;
            padding: 10px;
            font-size: 0.85rem;
            line-height: 1.4;
            min-height: 100px;
            color: #333;
            word-break: break-all;
        }
</style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Yuhan_OS_v1.1.exe</div>
            <div class="title-bar-controls">
                <button onclick="toggleSidebar('left')" aria-label="Minimize">_</button>
                <button onclick="toggleSidebar('right')" aria-label="Maximize">◻</button>
                
                <button class="btn-close" onclick="attemptClose()" aria-label="Close">X</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <a href="/">[Home]</a>
            <a href="/postlist.html">[Post]</a>
            <a href="/guestbook.html">[Guest Book]</a>
        </div>

        <div class="search-container">
            <div class="search-label">Search:</div>
            <input type="text" id="global-search" placeholder="Enter file name..." onkeypress="if(event.keyCode==13) { searchFile(); }">
            <button class="search-btn" onclick="searchFile()">[Go]</button>
        </div>

        <div class="window-body">
            {{ content }}
        </div>
    </div>

    <aside id="sidebar-left" class="sidebar sidebar-left">
        <div class="title-bar" style="background: #808080;">
            <div class="title-bar-text">SYSTEM_MENU</div>
            <div class="title-bar-controls">
                <button onclick="toggleSidebar('left')">X</button>
            </div>
        </div>
        <div class="window-body">
            <p>> CPU: ONLINE</p>
            <p>> RAM: STABLE</p>
        </div>
    </aside>

    <aside id="sidebar-right" class="sidebar sidebar-right">
    <div class="title-bar" style="background: #808080;">
        <div class="title-bar-text">USER_PROFILE</div>
        <div class="title-bar-controls">
            <button onclick="toggleSidebar('right')">X</button>
        </div>
    </div>

    <div class="window-body profile-container">
        <div class="profile-img-box">
            <img src="{{ site.baseurl }}/profile.png" alt="Profile Image">
        </div>

        <div class="profile-nickname">
            NICKNAME: YUHAN<br>
            ID: gun1234
        </div>

        <div class="profile-bio">
            <p style="margin: 0 0 8px 0; font-weight: bold; color: var(--main-purple);">[ STATUS ]</p>
            <p style="margin: 0;">
                Please verify your Hunter License. <br>
                > Current Location: Meteor City<br>
                > Level: Admin
            </p>
        </div>

        <div style="margin-top: 15px; font-size: 0.7rem; color: #666; width: 100%; text-align: left; font-family: monospace;">
            * Last Login: <span id="last-login">Loading...</span>
        </div>
    </div>
</aside>

    <script>
        function searchFile() {
            const query = document.getElementById('global-search').value;
            if (query.trim() !== "") {
                window.location.href = "{{ site.baseurl }}/search.html?q=" + encodeURIComponent(query);
            }
        }

        
        window.addEventListener('DOMContentLoaded', () => {
            const leftStatus = localStorage.getItem('sidebar-left');
            const rightStatus = localStorage.getItem('sidebar-right');
            
            
            if (window.innerWidth >= 768) {
                if (leftStatus === 'inactive') {
                    document.getElementById('sidebar-left').classList.add('inactive');
                    document.body.classList.add('no-left');
                }
                if (rightStatus === 'inactive') {
                    document.getElementById('sidebar-right').classList.add('inactive');
                    document.body.classList.add('no-right');
                }
            } 
            
            else {
                if (leftStatus === 'active') document.getElementById('sidebar-left').classList.add('active');
                if (rightStatus === 'active') document.getElementById('sidebar-right').classList.add('active');
            }
        });

        function toggleSidebar(side) {
            const left = document.getElementById('sidebar-left');
            const right = document.getElementById('sidebar-right');
            const target = side === 'left' ? left : right;
            const other = side === 'left' ? right : left;

            if (window.innerWidth < 768) {
                if (other.classList.contains('active')) {
                    other.classList.remove('active');
                    localStorage.setItem(`sidebar-${side === 'left' ? 'right' : 'left'}`, 'closed');
                }
                target.classList.toggle('active');
                
                
                const status = target.classList.contains('active') ? 'active' : 'closed';
                localStorage.setItem(`sidebar-${side}`, status);
            } 
            else {
                target.classList.toggle('inactive');
                if (side === 'left') document.body.classList.toggle('no-left');
                if (side === 'right') document.body.classList.toggle('no-right');
                
                
                const status = target.classList.contains('inactive') ? 'inactive' : 'active';
                localStorage.setItem(`sidebar-${side}`, status);
            }
        }


        document.addEventListener('DOMContentLoaded', () => {
            const timeElement = document.getElementById('last-login');
            if (timeElement) {
                timeElement.innerText = new Date().toLocaleString();
            }
        });


        function attemptClose() {
            const errorMsg = "권한 오류 (0x0000005): 당신에겐 이 페이지를 종료할 권한이 없습니다.";
            
            if (typeof showPopup === "function") {
                showPopup(errorMsg, false);
            } else {
                alert(errorMsg); 
            }
        }
    </script>
</body>
</html>
