<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        :root {
            --bg-color: #2d2430; /* 채도 낮은 어두운 보라 */
            --window-bg: #c0c0c0; /* 옛날 윈도우 회색 */
            --window-border-light: #ffffff;
            --window-border-dark: #808080;
            --accent-purple: #6b4d71;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace; /* 레트로 느낌 폰트 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 컴퓨터 창 디자인 */
        .window {
            background: var(--window-bg);
            border: 3px solid;
            border-color: var(--window-border-light) var(--window-border-dark) var(--window-border-dark) var(--window-border-light);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        /* 창 상단 파란 바 (타이틀 바) */
        .title-bar {
            background: linear-gradient(90deg, #4b3052, #8e6c96); /* 보라색 그라데이션 */
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        .title-bar-controls button {
            width: 16px;
            height: 14px;
            font-size: 9px;
            vertical-align: middle;
            background: var(--window-bg);
            border: 1px solid;
            border-color: white #808080 #808080 white;
            cursor: pointer;
        }

        .window-body {
            padding: 20px;
            color: #000;
        }

        /* 상단 바 메뉴 스타일 */
        .nav-menu {
            display: flex;
            gap: 15px;
            padding: 10px;
            border-bottom: 2px solid var(--window-border-dark);
        }
        .nav-menu a {
            color: #000;
            text-decoration: none;
            padding: 2px 5px;
        }
        .nav-menu a:hover {
            background: var(--accent-purple);
            color: white;
        }

        /* default.html의 <style> 안에 추가 */
        .post-content img {
            max-width: 100%;
            height: auto;
            border: 2px solid var(--window-border-dark);
            display: block;
            margin: 10px 0;
        }

        .post-content p {
            margin-bottom: 1em;
        }

        /* 마크다운 코드 블록 스타일 (레트로 느낌) */
        .post-content pre {
            background: #000;
            color: #0f0; /* 터미널 초록색 */
            padding: 10px;
            overflow-x: auto;
            font-size: 0.9rem;
            border: 2px inset #808080;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Yuhan_OS_v1.0.exe</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize">_</button>
                <button aria-label="Maximize">□</button>
                <button aria-label="Close">X</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <a href="/">[Home]</a>
            <a href="/postlist.html">[Post]</a>
        </div>

        <div class="window-body">
            {{ content }} </div>
    </div>
        <div style="margin-bottom: 20px; padding: 10px; border: 1px inset #808080; background: #e0e0e0; display: flex; align-items: center; gap: 10px;">
        <label for="post-search" style="font-weight: bold; font-size: 0.9rem;">Search_File:</label>
        <input type="text" id="post-search" placeholder="Type here..." 
           style="flex-grow: 1; border: 2px inset white; padding: 3px 5px; font-family: 'Courier New', monospace; outline: none;">
        </div>

    <ul id="post-list" style="list-style: none; padding: 0;">
        {% for post in site.posts %}
        <li class="post-item-container" style="margin-bottom: 15px; border: 1px solid #808080; padding: 10px; background: white;">
            <small>{{ post.date | date: "%Y-%m-%d" }}</small><br>
                <a href="{{ post.url | relative_url }}" class="post-title" style="color: #4b3052; font-weight: bold; font-size: 1.2rem; text-decoration: none;">
            {{ post.title }}
            </a>
            <p class="post-excerpt" style="display:none;">{{ post.content | strip_html | downcase }}</p>
        </li>
        {% endfor %}
    </ul>

<p id="no-results" style="display: none; color: #4b3052; font-weight: bold; text-align: center;">
    [!] Error: No files found matching your criteria.
</p>
</body>
<script>
    const searchInput = document.getElementById('post-search');
    const postItems = document.querySelectorAll('.post-item-container');
    const noResults = document.getElementById('no-results');

    searchInput.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        let hasVisibleItems = false;

        postItems.forEach(item => {
            const title = item.querySelector('.post-title').textContent.toLowerCase();
            const excerpt = item.querySelector('.post-excerpt').textContent;

            // 제목이나 본문에 검색어가 포함되어 있는지 확인
            if (title.includes(searchTerm) || excerpt.includes(searchTerm)) {
                item.style.display = 'block';
                hasVisibleItems = true;
            } else {
                item.style.display = 'none';
            }
        });

        // 결과가 하나도 없으면 에러 메시지 표시
        noResults.style.display = hasVisibleItems ? 'none' : 'block';
    });
</script>
</html>
