<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        :root {
            --bg-color: #2d2430; /* 채도 낮은 어두운 보라 */
            --window-bg: #c0c0c0; /* 옛날 윈도우 회색 */
            --window-border-light: #ffffff;
            --window-border-dark: #808080;
            --accent-purple: #6b4d71;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace; /* 레트로 느낌 폰트 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 컴퓨터 창 디자인 */
        .window {
            background: var(--window-bg);
            border: 3px solid;
            border-color: var(--window-border-light) var(--window-border-dark) var(--window-border-dark) var(--window-border-light);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        /* 창 상단 파란 바 (타이틀 바) */
        .title-bar {
            background: linear-gradient(90deg, #4b3052, #8e6c96); /* 보라색 그라데이션 */
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        .title-bar-controls button {
            width: 16px;
            height: 14px;
            font-size: 9px;
            vertical-align: middle;
            background: var(--window-bg);
            border: 1px solid;
            border-color: white #808080 #808080 white;
            cursor: pointer;
        }

        .window-body {
            padding: 20px;
            color: #000;
        }

        /* 상단 바 메뉴 스타일 */
        .nav-menu {
            display: flex;
            gap: 15px;
            padding: 10px;
            border-bottom: 2px solid var(--window-border-dark);
        }
        .nav-menu a {
            color: #000;
            text-decoration: none;
            padding: 2px 5px;
        }
        .nav-menu a:hover {
            background: var(--accent-purple);
            color: white;
        }

        /* default.html의 <style> 안에 추가 */
        .post-content img {
            max-width: 100%;
            height: auto;
            border: 2px solid var(--window-border-dark);
            display: block;
            margin: 10px 0;
        }

        .post-content p {
            margin-bottom: 1em;
        }

        /* 마크다운 코드 블록 스타일 (레트로 느낌) */
        .post-content pre {
            background: #000;
            color: #0f0; /* 터미널 초록색 */
            padding: 10px;
            overflow-x: auto;
            font-size: 0.9rem;
            border: 2px inset #808080;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Yuhan_OS_v1.0.exe</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize">_</button>
                <button aria-label="Maximize">□</button>
                <button aria-label="Close">X</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <a href="/">[Home]</a>
            <a href="/postlist.html">[Post]</a>
        </div>

        <div class="window-body">
            {{ content }} </div>
    </div>

</body>
</html>
