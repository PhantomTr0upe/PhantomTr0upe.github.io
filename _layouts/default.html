<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        :root {
            --bg-color: #1a151d; /* 배경은 더 어둡게 */
            --window-bg: #c0c0c0;
            --window-border-light: #ffffff;
            --window-border-dark: #808080;
            --main-purple: #4E00F9; /* 요청하신 메인 컬러 */
            --accent-blue: #8AD0FD; /* 그라데이션 끝 색상 */
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px; /* 모바일 여백 줄임 */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .window {
            background: var(--window-bg);
            border: 3px solid;
            border-color: var(--window-border-light) var(--window-border-dark) var(--window-border-dark) var(--window-border-light);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            width: 90%; /* 창 넓이 확장 */
            max-width: 900px;
            margin-bottom: 20px;
            overflow: hidden; /* 내용 튀어나옴 방지 */
        }

        .title-bar {
            /* 요청하신 그라데이션 적용 */
            background: linear-gradient(90deg, var(--main-purple), var(--accent-blue));
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
            padding: 8px;
            border-bottom: 2px solid var(--window-border-dark);
            flex-wrap: wrap; /* 모바일에서 메뉴 줄바꿈 허용 */
        }
        .nav-menu a { color: #000; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        /* 🔍 검색바 수정 (모바일 대응) */
        .search-container {
            background: #808080;
            padding: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
            border-bottom: 2px solid white;
        }
        .search-label {
            background: var(--window-bg);
            padding: 2px 8px;
            border: 1px inset white;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap; /* 글자 줄바꿈 방지 */
        }
        #global-search {
            flex-grow: 1;
            min-width: 50px; /* 최소 너비 확보 */
            border: 2px inset white;
            padding: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px; /* 모바일 자동확대 방지 */
        }
        .search-btn {
            background: var(--window-bg);
            border: 2px solid;
            border-color: white #808080 #808080 white;
            cursor: pointer;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
        }

        .window-body { padding: 15px; color: #000; word-break: break-all; }

        @media (max-width: 480px) {
            .title-bar-text { font-size: 0.7rem; }
            .window { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Yuhan_OS_v1.1.exe</div>
            <div class="title-bar-controls">
                <button style="width:16px; height:14px; font-size:9px;">_</button>
                <button style="width:16px; height:14px; font-size:9px;">X</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <a href="/">[Home]</a>
            <a href="/postlist.html">[Post]</a>
        </div>

        <div class="search-container">
            <div class="search-label">Search:</div>
            <input type="text" id="global-search" placeholder="Enter file name..." onkeypress="if(event.keyCode==13) { searchFile(); }">
            <button class="search-btn" onclick="searchFile()">[Go]</button>
        </div>

        <div class="window-body">
            {{ content }}
        </div>
    </div>

    <script>
        function searchFile() {
            const query = document.getElementById('global-search').value;
            if (query.trim() !== "") {
                window.location.href = "{{ site.baseurl }}/search.html?q=" + encodeURIComponent(query);
            }
        }
    </script>
</body>
</html>
