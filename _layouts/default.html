<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        @font-face {
            font-family: 'YKompyuta';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/Ycomputer-Regular.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #1a151d; 
            --window-bg: #dddcdc;
            --window-border-light: #ffffff;
            --window-border-dark: #808080;
            --main-purple: #4E00F9; 
            --accent-blue: #8AD0FD; 
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px; 
            font-family: 'Courier New', 'YKompyuta';
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .window {
            background: var(--window-bg);
            border: 3px solid;
            border-color: var(--window-border-light) var(--window-border-dark) var(--window-border-dark) var(--window-border-light);
            box-shadow: 10px 10px 0px rgba(78, 0, 249, 0.2);
            width: 90%; 
            max-width: 900px;
            margin-bottom: 20px;
            overflow: hidden; 
            
        }

        .title-bar {
            background: linear-gradient(90deg, var(--main-purple), var(--accent-blue));
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
            padding: 8px;
            border-bottom: 2px solid var(--window-border-dark);
            flex-wrap: wrap; 
        }
        .nav-menu a { color: #000; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        .search-container {
            background: #808080;
            padding: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
            border-bottom: 2px solid white;
        }
        .search-label {
            background: var(--window-bg);
            padding: 2px 8px;
            border: 1px inset white;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap; 
        }
        #global-search {
            flex-grow: 1;
            min-width: 50px; 
            border: 2px inset white;
            padding: 4px;
            font-size: 14px; 
        }
        .search-btn {
            background: var(--window-bg);
            border: 2px solid;
            border-color: white #808080 #808080 white;
            cursor: pointer;
            padding: 2px 8px;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .window-body { padding: 15px; color: #000; word-break: break-all; }

        @media (max-width: 480px) {
            .title-bar-text { font-size: 0.7rem; }
            .window { width: 95%; }
        }

        body {
            background-color: #ffffff; 
    
            background-image: url('{{ site.baseurl }}/bg.svg'); 
    
            background-repeat: repeat; 
            
            background-size: 800px; 
    
            background-attachment: fixed;
            background-position: center;

            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
</style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Yuhan_OS_v1.1.exe</div>
            <div class="title-bar-controls">
                <button style="width:16px; height:14px; font-size:9px;">_</button>
                <button style="width:16px; height:14px; font-size:9px;">X</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <a href="/">[Home]</a>
            <a href="/postlist.html">[Post]</a>
        </div>

        <div class="search-container">
            <div class="search-label">Search:</div>
            <input type="text" id="global-search" placeholder="Enter file name..." onkeypress="if(event.keyCode==13) { searchFile(); }">
            <button class="search-btn" onclick="searchFile()">[Go]</button>
        </div>

        <div class="window-body">
            {{ content }}
        </div>
    </div>

    <script>
        function searchFile() {
            const query = document.getElementById('global-search').value;
            if (query.trim() !== "") {
                window.location.href = "{{ site.baseurl }}/search.html?q=" + encodeURIComponent(query);
            }
        }
    </script>
</body>
</html>
