---
layout: default
title: Color Tiles
---

<div class="window" style="max-width: 600px; margin: 0 auto;">
    <div class="title-bar">
        <div class="title-bar-text">ColorTiles.exe - System Training</div>
    </div>
    <div class="window-body" style="text-align: center; background: #c0c0c0;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; background: #000; color: #0f0; padding: 5px; font-family: monospace;">
            <span>TIME: <span id="timer">120</span>s</span>
            <span>SCORE: <span id="score">0</span></span>
        </div>

        <div id="game-board" style="display: grid; grid-template-columns: repeat(20, 1fr); gap: 1px; background: #808080; border: 2px inset white; padding: 2px; cursor: crosshair;">
            </div>

        <div style="margin-top: 15px;">
            <button onclick="startGame()" style="padding: 5px 20px; font-weight: bold; cursor: pointer;">NEW GAME</button>
            <p style="font-size: 11px; color: #444; margin-top: 10px;">
                * 빈 공간을 클릭하세요. 상하좌우로 가장 가까운 타일과 색이 같으면 획득합니다.<br>
                * 잘못 클릭하면 시간이 10초 줄어듭니다!
            </p>
        </div>
    </div>
</div>

<script>
    const boardSize = { rows: 10, cols: 20 };
    const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']; // 빨, 초, 파, 노, 보
    let score = 0;
    let timeLeft = 120;
    let gameInterval;
    let board = [];

    function startGame() {
        score = 0;
        timeLeft = 120;
        document.getElementById('score').innerText = score;
        document.getElementById('timer').innerText = timeLeft;
        createBoard();
        
        clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function createBoard() {
        const boardElement = document.getElementById('game-board');
        boardElement.innerHTML = '';
        board = [];

        for (let r = 0; r < boardSize.rows; r++) {
            board[r] = [];
            for (let c = 0; c < boardSize.cols; c++) {
                const color = Math.random() > 0.2 ? colors[Math.floor(Math.random() * colors.length)] : null;
                board[r][c] = color;

                const tile = document.createElement('div');
                tile.style.width = '100%';
                tile.style.paddingTop = '100%';
                tile.style.backgroundColor = color || 'transparent';
                tile.dataset.row = r;
                tile.dataset.col = c;
                tile.onclick = (e) => handleEntryClick(r, c);
                
                boardElement.appendChild(tile);
            }
        }
    }

    function handleEntryClick(r, c) {
        if (board[r][c] !== null) return; 

        const matches = findMatches(r, c);
        if (matches.length > 0) {
            matches.forEach(m => {
                removeTile(m.r, m.c);
                score++;
            });
            document.getElementById('score').innerText = score;
        } else {
            timeLeft -= 10; 
            if (timeLeft < 0) timeLeft = 0;
            document.getElementById('timer').innerText = timeLeft;
        }
    }

    function findMatches(r, c) {
        const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]]; 
        let found = [];

        directions.forEach(([dr, dc]) => {
            let currR = r + dr;
            let currC = c + dc;
            while (currR >= 0 && currR < boardSize.rows && currC >= 0 && currC < boardSize.cols) {
                if (board[currR][currC] !== null) {
                    found.push({ r: currR, c: currC, color: board[currR][currC] });
                    break;
                }
                currR += dr;
                currC += dc;
            }
        });

        const result = [];
        for (let i = 0; i < found.length; i++) {
            for (let j = i + 1; j < found.length; j++) {
                if (found[i].color === found[j].color) {
                    result.push(found[i], found[j]);
                }
            }
        }
        return [...new Set(result)]; 
    }

    function removeTile(r, c) {
        board[r][c] = null;
        const index = r * boardSize.cols + c;
        const tile = document.getElementById('game-board').children[index];
        tile.style.backgroundColor = 'transparent';
    }

    function endGame() {
        clearInterval(gameInterval);
        alert(`GAME OVER! Final Score: ${score}`);
    }

    window.onload = startGame;
</script>
