<!DOCTYPE html>
<html>
<head>
    <title>home</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #816c86;
            padding: 20px 0;
            box-sizing: border-box;
        }

        /* 첫 번째 상자 스타일 수정 */
        .header-box {
            width: 50%;
            height: 80px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex; 
            align-items: center; 
            justify-content: space-between; /* 추가: 왼쪽(로고)과 오른쪽(메뉴)을 양 끝으로! */
            padding: 0 30px; /* 여백을 조금 더 줬어 */
            box-sizing: border-box;
        }

        /* 로고와 제목을 가로로 정렬해주는 상자 */
        .header-left {
            display: flex;
            align-items: center; /* 세로 중앙 맞춤 */
            gap: 15px; /* 로고와 글자 사이 간격 */
        }

        /* 사이트 제목 글자 스타일 */
        .site-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 메뉴 전체를 감싸는 상자 */
        .nav-menu {
            display: flex;
            gap: 20px; /* 메뉴 글자 사이의 간격 */
        }

        /* 메뉴 글자 스타일 */
        .nav-menu a {
            color: #333;
            font-weight: bold;
            text-decoration: none; /* 밑줄 없애기 */
            font-size: 1rem;
            transition: color 0.2s;
        }

        /* 마우스를 올렸을 때 색깔 변화 */
        .nav-menu a:hover {
            color: #007bff; /* 파란색으로 변함 */
        }

        /* 검은색 원 로고 */
        .logo-circle {
            width: 40px;
            height: 40px;
            background-color: black;
            border-radius: 50%; /* 50%를 주면 완벽한 원이 돼! */
            cursor: pointer; /* 마우스를 올리면 손가락 모양으로 변함 */
            transition: transform 0.2s; /* 누를 때 효과를 위해 */

            /* 아래 3줄이 사진을 넣는 핵심 코드야! */
            background-image: url('https://i.ibb.co/yF0D9yJq/265834165.png'); /* 여기에 네 사진 파일 이름을 적어줘 */
            background-size: cover;    /* 사진이 원에 꽉 차게 조절 */
            background-position: center; /* 사진의 가운데가 보이게 설정 */
            border: 2px solid white;   /* 원 테두리를 살짝 주면 더 예뻐! */
        }

        .logo-circle:hover {
            transform: scale(1.1); /* 마우스를 올리면 살짝 커지는 효과 */
        }

        /* 두 번째 상자 (기본 스타일 그대로) */
        .content-box {
            width: 50%;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            padding-left: 40px;
            padding-bottom: 30px;
            box-sizing: border-box;
        }

        /* 하이퍼링크 밑줄 제거 */
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header-box">
        <div class="header-left">
            <a href="index.html">
                <div class="logo-circle"></div>
            </a>
        <span class="site-title"><a href="index.html"><span style="color:#333">Yuhan</span></a></span>
    </div>

    <div class="nav-menu">
        <a href="index.html">Home</a>
        <a href="post.html">Post</a>
    </div>

</div>

    <div class="content-box">
        <h2>Notion</h2>
        <p>모 캐릭터들의 누나/여동생/딸래미/엄마 호소를 함
            <br>드림도 하는데 이쪽 계정에선 언급 일절 없습니다
            <br>제 쪽에서 먼저 안 썰어요 재연결 OK
            <br>드림 하나 배려 X
            <br>파는 장르들 필터 없는 스포 많아요
            <br>진짜 가끔 근친 언급 있을 수도...</p>
    </div>

</body>
</html>
